<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGA Nostos - Lobby</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="toplist">
        <li onclick="window.location.href='index.html'">Home</li>
        <li onclick="window.location.href='lobby.html'">Products</li>
        <li onclick="window.location.href='about.html'">About</li>
        <li id="logoutBtn" onclick="handleLogout()" style="background-color: #e05555;">Logout</li>
    </nav>

    <div class="topdivers">
        <img class="logo" src="Nostos_Logo.png" alt="Nostos App Logo" onclick="window.location.href='index.html'">
        <h1>NGA Nostos</h1>
    </div>

    <div class="content-view">
        <div class="headdivers">
            <h1>NGASoft's Nostos</h1>
            <h2 id="welcomeMsg">Welcome</h2>
            <p id="jobBadge" class="job-badge"></p>
        </div>

        <ul class="downloader">
            <li onclick="window.location.href='https://github.com/GiannisHar/NostosDownloaderWeb/releases/download/nostos/app-release.apk'">
                <span class="dl-icon">&#9662;</span> Download APK
            </li>
            <li onclick="window.location.href='https://nostos-web.vercel.app/'">
                <span class="dl-icon">&#9741;</span> Open Web App
            </li>
            <li onclick="window.location.href='https://github.com/GiannisHar/NostosDownloaderWeb/releases/download/nostos/NostosWindows.zip'">
                <span class="dl-icon">&#8862;</span> Download Windows
            </li>
        </ul>
    </div>

    <footer>
        <p>NGASoft &copy; All Rights Reserved</p>
    </footer>

    <script>
        // Guard: redirect to login if not authenticated
        const userData = sessionStorage.getItem("nostos_user");
        if (!userData) {
            window.location.href = "login.html";
        } else {
            const user = JSON.parse(userData);
            document.getElementById("welcomeMsg").textContent = "Welcome, " + (user.name || user.id);

            // Show role badge
            const badge = document.getElementById("jobBadge");
            const jobLabels = { admin: "Administrator", groom: "Service Staff", user: "Guest" };
            badge.textContent = jobLabels[user.job] || user.job;
            badge.classList.add("badge-" + user.job);
        }

        function handleLogout() {
            sessionStorage.removeItem("nostos_user");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
