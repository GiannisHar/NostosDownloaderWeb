<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGA Nostos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <img class="topbar-logo" src="Nostos_Logo.png" alt="Nostos">
    <span class="topbar-title">NGA <span class="topbar-accent">Nostos</span></span>
</header>

<div class="page">
    <div class="card">
        <h1 class="card-title" id="welcomeMsg">Download Nostos</h1>
        <p class="card-subtitle">Choose your platform to get started.</p>

        <div class="downloads">
            <button class="dl-btn" onclick="guardedDownload('https://github.com/GiannisHar/NostosDownloaderWeb/releases/download/nostos/app-release.apk')">
                <span class="dl-icon">📱</span> Android APK
            </button>
            <button class="dl-btn" onclick="guardedDownload('https://nostos-web.vercel.app/')">
                <span class="dl-icon">🌐</span> Web App
            </button>
            <button class="dl-btn" onclick="guardedDownload('https://github.com/GiannisHar/NostosDownloaderWeb/releases/download/nostos/NostosWindows.zip')">
                <span class="dl-icon">💻</span> Windows
            </button>
        </div>

        <div id="userBar" class="user-bar" style="display:none;">
            <span class="user-bar-text">Signed in as <span class="user-bar-name" id="userName"></span></span>
            <button class="btn-logout" onclick="handleLogout()">Logout</button>
        </div>
    </div>
</div>

<footer class="footer">
    NGASoft &middot; All Rights Reserved
</footer>

<script>
// ─── SESSION ─────────────────────────────────────────
function getUser() {
    try {
        const stored = sessionStorage.getItem("nostos_user");
        if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.id && parsed.token) return parsed;
        }
    } catch(e) {}
    return null;
}

function updateUI() {
    const user = getUser();
    if (user) {
        document.getElementById("welcomeMsg").textContent = "Welcome, " + (user.name || user.id);
        document.getElementById("userName").textContent = user.name || user.id;
        document.getElementById("userBar").style.display = "flex";
    } else {
        document.getElementById("welcomeMsg").textContent = "Download Nostos";
        document.getElementById("userBar").style.display = "none";
    }
}

updateUI();

// ─── DOWNLOAD GUARD ──────────────────────────────────
function guardedDownload(url) {
    if (getUser()) {
        window.location.href = url;
        return;
    }
    // Save target, redirect to login
    sessionStorage.setItem("nostos_pending_download", url);
    window.location.href = "login.html";
}

// ─── CHECK PENDING DOWNLOAD (returning from login) ──
(function checkPending() {
    const user = getUser();
    const pending = sessionStorage.getItem("nostos_pending_download");
    if (user && pending) {
        sessionStorage.removeItem("nostos_pending_download");
        window.location.href = pending;
    }
})();

// ─── LOGOUT ──────────────────────────────────────────
function handleLogout() {
    sessionStorage.removeItem("nostos_user");
    updateUI();
}
</script>

</body>
</html>
