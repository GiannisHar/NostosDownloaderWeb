<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Car Dispatch</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <img class="topbar-logo" src="Nostos_Logo.png" alt="Club Car Dispatch">
    <span class="topbar-title">Club Car <span class="topbar-accent">Dispatch</span></span>
</header>

<div class="page">
    <div class="card">
        <h1 class="card-title" id="welcomeMsg">Download the App</h1>
        <p class="card-subtitle">Select your platform to get started.</p>

        <div class="downloads">

            <button class="dl-btn" onclick="guardedDownload('android')">
                <span class="dl-icon">
                    <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 16V8a7 7 0 0 1 14 0v8"/>
                        <path d="M7.5 6.5l-2 -3"/>
                        <path d="M16.5 6.5l2 -3"/>
                        <rect x="4" y="16" width="16" height="5" rx="1.5"/>
                        <line x1="12" y1="16" x2="12" y2="21"/>
                    </svg>
                </span>
                <span class="dl-label">
                    <span class="dl-label-main">Android</span>
                    <span class="dl-label-sub">Download APK file</span>
                </span>
                <span class="dl-arrow">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </span>
            </button>

            <button class="dl-btn" onclick="guardedDownload('web')">
                <span class="dl-icon">
                    <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M2 12h20"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </span>
                <span class="dl-label">
                    <span class="dl-label-main">Web App</span>
                    <span class="dl-label-sub">Open in browser</span>
                </span>
                <span class="dl-arrow">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </span>
            </button>

            <button class="dl-btn" onclick="guardedDownload('windows')">
                <span class="dl-icon">
                    <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="13" rx="2"/>
                        <line x1="7" y1="20" x2="17" y2="20"/>
                        <line x1="12" y1="17" x2="12" y2="20"/>
                    </svg>
                </span>
                <span class="dl-label">
                    <span class="dl-label-main">Windows</span>
                    <span class="dl-label-sub">Download ZIP archive</span>
                </span>
                <span class="dl-arrow">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </span>
            </button>

        </div>

        <div id="userBar" class="user-bar" style="display:none;">
            <span class="user-bar-text">Signed in as <span class="user-bar-name" id="userName"></span></span>
            <button class="btn-logout" onclick="handleLogout()">Sign out</button>
        </div>
    </div>
</div>

<footer class="footer">
    NGASoft &middot; All Rights Reserved
</footer>

<script>
// ─── CONFIG ──────────────────────────────────────────
const SERVER_URL = "https://nga-serveraki.onrender.com"; // <-- CHANGE THIS
// ─────────────────────────────────────────────────────

function getUser() {
    try {
        var s = sessionStorage.getItem("nostos_user");
        if (s) return JSON.parse(s);
    } catch(e) {}
    return null;
}

function updateUI() {
    var u = getUser();
    if (u) {
        document.getElementById("welcomeMsg").textContent = "Welcome, " + (u.name || u.id);
        document.getElementById("userName").textContent = u.name || u.id;
        document.getElementById("userBar").style.display = "flex";
    } else {
        document.getElementById("welcomeMsg").textContent = "Download the App";
        document.getElementById("userBar").style.display = "none";
    }
}
updateUI();

function guardedDownload(platform) {
    var u = getUser();
    if (u) {
        // Web app just opens in browser — no token needed
        if (platform === "web") {
            window.location.href = "https://nostos-web.vercel.app/";
            return;
        }
        // Check we have a token
        if (!u.dl_token) {
            alert("Session expired. Please sign in again.");
            handleLogout();
            return;
        }
        // Hit the secure server endpoint
        window.location.href = SERVER_URL + "/download/" + platform
            + "?id=" + encodeURIComponent(u.id)
            + "&session=" + encodeURIComponent(u.dl_token);
        return;
    }
    // Not logged in — save which platform they wanted, then redirect to login
    sessionStorage.setItem("nostos_pending_download", platform);
    window.location.href = "login.html";
}

// After returning from login, auto-trigger the pending download
(function() {
    var u = getUser(), p = sessionStorage.getItem("nostos_pending_download");
    if (u && p) {
        sessionStorage.removeItem("nostos_pending_download");
        guardedDownload(p);
    }
})();

function handleLogout() {
    sessionStorage.removeItem("nostos_user");
    updateUI();
}
</script>

</body>
</html>
