<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGA Nostos</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<ul id="toplist">
<li onclick="window.location.href='index.html'">Home</li>
<li onclick="window.location.href='login.html'">Products</li>
<li onclick="window.location.href='about.html'">About</li>
</ul>

<div class="topdivers">
<img class="logo" src="Nostos_Logo.png" alt="Nostos App Logo" onclick="window.location.href='index.html'">
<h1>NGA Nostos</h1>
</div>

<div class="diver">
<h1>NGA Nostos</h1>

<main>
<div class="login-form">
<p>User/Groom ID</p>
<input type="text" id="loginId" required>
<p>Password</p>
<input type="password" id="loginPassword" required>
<div id="errorMsg" class="error-msg"></div>
<button class="submit-btn" id="loginBtn" onclick="handleLogin()">Login</button>
</div>
</main>

</div>

</body>

<footer>
NGASoft All Rights Reserved
</footer>

<script>
// ─── CONFIG ──────────────────────────────────────────
const API_URL = "https://nga-serveraki.onrender.com"; // <-- CHANGE THIS
// ─────────────────────────────────────────────────────

// If already logged in, redirect to lobby
if (sessionStorage.getItem("nostos_user")) {
    window.location.href = "lobby.html";
}

async function handleLogin() {
    const id = document.getElementById("loginId").value.trim();
    const password = document.getElementById("loginPassword").value;
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");

    errorMsg.textContent = "";

    if (!id || !password) {
        errorMsg.textContent = "Please fill in both fields.";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = "Logging in...";

    try {
        const response = await fetch(API_URL + "/loginweb", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: id, password: password })
        });

        const result = await response.json();

        if (result.success) {
            sessionStorage.setItem("nostos_user", JSON.stringify({
                id: result.id,
                name: result.name,
                job: result.job
            }));
            window.location.href = "lobby.html";
        } else {
            if (result.reason === "rate_limited") {
                errorMsg.textContent = "Too many attempts. Please wait a moment.";
            } else {
                errorMsg.textContent = "Invalid ID or password.";
            }
        }
    } catch (err) {
        console.error("Login error:", err);
        errorMsg.textContent = "Could not connect to server. Please try again.";
    }

    loginBtn.disabled = false;
    loginBtn.textContent = "Login";
}

// Allow Enter key to submit
document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        handleLogin();
    }
});
</script>

</html>
