<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Car Dispatch — Sign In</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <img class="topbar-logo" src="Nostos_Logo.png" alt="Club Car Dispatch" style="cursor:pointer;" onclick="window.location.href='index.html'">
    <span class="topbar-title" style="cursor:pointer;" onclick="window.location.href='index.html'">Club Car <span class="topbar-accent">Dispatch</span></span>
</header>

<div class="page">
    <div class="card login-card">
        <h1 class="card-title">Sign In</h1>
        <p class="card-subtitle">Log in to access your download.</p>

        <div class="form-group">
            <label class="form-label" for="loginId">Staff ID</label>
            <input class="form-input" type="text" id="loginId" placeholder="Enter your ID" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input class="form-input" type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In</button>

        <p class="members-note">Access is restricted to authorized resort staff only.</p>

        <a class="back-link" href="index.html">&larr; Back to downloads</a>
    </div>
</div>

<footer class="footer">
    NGASoft &middot; All Rights Reserved
</footer>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────────
const SERVER_URL = "https://nga-serveraki.onrender.com"; // <-- CHANGE THIS
// ─────────────────────────────────────────────────────

// Already logged in? Go back to lobby
(function() {
    try {
        var s = sessionStorage.getItem("nostos_user");
        if (s && JSON.parse(s).id) { window.location.href = "index.html"; return; }
    } catch(e) { sessionStorage.removeItem("nostos_user"); }
})();

const socket = io(SERVER_URL, { transports: ["websocket"], autoConnect: true });

socket.on("connect", () => console.log("Connected:", socket.id));

socket.on("connect_error", () => {
    document.getElementById("errorMsg").textContent = "Could not connect to server.";
    document.getElementById("loginBtn").disabled = false;
    document.getElementById("loginBtn").textContent = "Sign In";
});

socket.on("loginweb_response", (data) => {
    var err = document.getElementById("errorMsg");
    var btn = document.getElementById("loginBtn");

    if (data.success) {
        sessionStorage.setItem("nostos_user", JSON.stringify({
            id: data.id,
            name: data.name,
            job: data.job,
            dl_token: data.dl_token   // ← store the download token
        }));
        window.location.href = "index.html";
    } else {
        err.textContent = data.reason === "rate_limited"
            ? "Too many attempts. Please wait."
            : "Invalid ID or password.";
        btn.disabled = false;
        btn.textContent = "Sign In";
    }
});

function handleLogin() {
    var id = document.getElementById("loginId").value.trim();
    var pw = document.getElementById("loginPassword").value;
    var err = document.getElementById("errorMsg");
    var btn = document.getElementById("loginBtn");
    err.textContent = "";
    if (!id || !pw) { err.textContent = "Please fill in both fields."; return; }
    if (!socket.connected) { err.textContent = "Connecting to server..."; return; }
    btn.disabled = true;
    btn.textContent = "Signing in...";
    socket.emit("loginweb", { id: id, password: pw });
}

document.addEventListener("keydown", function(e) { if (e.key === "Enter") handleLogin(); });
</script>

</body>
</html>
